<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORACLE // Market Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b0f;
    --surface: #0d1117;
    --surface2: #131920;
    --border: #1e2d3d;
    --border2: #243447;
    --accent: #00d4aa;
    --accent2: #0088ff;
    --accent3: #ff6b35;
    --red: #ff4444;
    --green: #00d4aa;
    --yellow: #f5c518;
    --text: #c9d1d9;
    --text2: #8b949e;
    --text3: #4d5966;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TOPBAR ── */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 44px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  #live-time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.05em;
  }

  #last-updated {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }

  .btn-refresh {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-refresh:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-refresh.spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── MAIN LAYOUT ── */
  #main {
    display: grid;
    grid-template-columns: 300px 1fr 280px;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* ── PANELS ── */
  .panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel:last-child { border-right: none; border-left: 1px solid var(--border); }

  .panel-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .panel-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--text3);
    text-transform: uppercase;
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .panel-body::-webkit-scrollbar { width: 3px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── SEARCH BAR (in panel header) ── */
  .panel-search {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .panel-search input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 10px;
    padding: 5px 8px;
    outline: none;
    transition: border 0.15s;
  }
  .panel-search input:focus { border-color: var(--accent2); }
  .panel-search input::placeholder { color: var(--text3); }
  .panel-search button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 10px;
    padding: 5px 8px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .panel-search button:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── MARKET CARD ── */
  .market-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 10px 12px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: border-color 0.15s;
    animation: fadeIn 0.3s ease;
  }
  .market-card:hover { border-color: var(--border2); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .market-q {
    font-size: 11px;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 8px;
    font-family: var(--sans);
  }

  .market-vol {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text3);
    margin-bottom: 8px;
  }
  .market-vol span { color: var(--yellow); }

  .prob-bars { display: flex; flex-direction: column; gap: 5px; }
  .prob-row { display: flex; flex-direction: column; gap: 2px; }
  .prob-label-row { display: flex; justify-content: space-between; }
  .prob-label { font-family: var(--mono); font-size: 9px; color: var(--text2); }
  .prob-pct {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
  }
  .prob-pct.high { color: var(--green); }
  .prob-pct.low { color: var(--red); }
  .prob-pct.mid { color: var(--yellow); }

  .prob-bar-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .prob-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }
  .prob-bar-fill.yes { background: var(--green); }
  .prob-bar-fill.no { background: var(--red); }
  .prob-bar-fill.other { background: var(--accent2); }

  .market-link {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text3);
    text-decoration: none;
    display: inline-block;
    margin-top: 6px;
    transition: color 0.15s;
  }
  .market-link:hover { color: var(--accent2); }

  /* ── NEWS CARD ── */
  .news-card {
    border-bottom: 1px solid var(--border);
    padding: 10px 4px;
    animation: fadeIn 0.3s ease;
  }
  .news-source {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--accent2);
    letter-spacing: 0.1em;
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
  }
  .news-date { color: var(--text3); }
  .news-title {
    font-size: 12px;
    color: var(--text);
    line-height: 1.5;
    cursor: pointer;
    text-decoration: none;
    display: block;
    transition: color 0.15s;
  }
  .news-title:hover { color: var(--accent); }

  /* ── CHAT ── */
  #chat-panel {
    display: flex;
    flex-direction: column;
    background: var(--bg);
    overflow: hidden;
  }

  #chat-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--surface);
  }

  .chat-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--text3);
    text-transform: uppercase;
  }

  .btn-clear {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text3);
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-clear:hover { border-color: var(--red); color: var(--red); }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 88%;
    animation: msgIn 0.2s ease;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot { align-self: flex-start; align-items: flex-start; }

  .msg-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .msg.user .msg-label { color: var(--accent2); }

  .msg-bubble {
    padding: 10px 14px;
    font-size: 13px;
    line-height: 1.6;
    border-radius: 2px;
  }
  .msg.user .msg-bubble {
    background: #0a2a4a;
    border: 1px solid #0d3a6e;
    color: var(--text);
    border-radius: 2px 2px 0 2px;
  }
  .msg.bot .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 2px 2px 2px 0;
    white-space: pre-wrap;
  }

  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    width: fit-content;
  }
  .typing-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    animation: typingBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%,80%,100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-4px); opacity: 1; }
  }

  /* ── INPUT ── */
  #input-area {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  #user-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 10px 14px;
    resize: none;
    outline: none;
    transition: border-color 0.15s;
    min-height: 42px;
    max-height: 120px;
    line-height: 1.4;
  }
  #user-input:focus { border-color: var(--accent2); }
  #user-input::placeholder { color: var(--text3); }

  #send-btn {
    background: var(--accent2);
    border: none;
    color: white;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.15s;
    height: 42px;
    white-space: nowrap;
  }
  #send-btn:hover { background: #0099ff; }
  #send-btn:disabled { background: var(--border); cursor: not-allowed; }

  .input-hint {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text3);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 11px;
    text-align: center;
    gap: 8px;
    letter-spacing: 0.05em;
  }
  .empty-state .icon { font-size: 28px; opacity: 0.3; }

  /* ── LOADING ── */
  .loading-shimmer {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    height: 80px;
    margin-bottom: 6px;
    border-radius: 2px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── WELCOME MSG ── */
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--text3);
    font-family: var(--mono);
    text-align: center;
    gap: 6px;
    padding: 20px;
  }
  #welcome h2 {
    font-size: 14px;
    letter-spacing: 0.2em;
    color: var(--text2);
    margin-bottom: 4px;
  }
  #welcome p { font-size: 10px; line-height: 1.8; max-width: 340px; }
  #welcome .suggestions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 16px;
    width: 100%;
    max-width: 380px;
  }
  .suggestion-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 10px;
    padding: 8px 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .suggestion-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* notification dot */
  .badge {
    background: var(--accent3);
    color: white;
    font-family: var(--mono);
    font-size: 8px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 1px;
  }
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">ORACLE</div>
  <div class="topbar-right">
    <span id="last-updated">Initializing...</span>
    <span id="live-time"></span>
    <button class="btn-refresh" id="refresh-btn" onclick="refreshData()">⟳ REFRESH</button>
  </div>
</div>

<div id="main">

  <!-- LEFT: Markets -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Polymarket</span>
      <span class="badge" id="market-count">—</span>
    </div>
    <div class="panel-search">
      <input type="text" id="market-search" placeholder="Search markets..." onkeydown="if(event.key==='Enter') searchMarkets()">
      <button onclick="searchMarkets()">GO</button>
    </div>
    <div class="panel-body" id="markets-body">
      <div class="loading-shimmer"></div>
      <div class="loading-shimmer"></div>
      <div class="loading-shimmer" style="height:50px"></div>
    </div>
  </div>

  <!-- CENTER: Chat -->
  <div id="chat-panel">
    <div id="chat-header">
      <span class="chat-title">Intelligence Feed</span>
      <button class="btn-clear" onclick="clearHistory()">CLEAR</button>
    </div>

    <div id="messages">
      <div id="welcome">
        <h2>// ORACLE ONLINE</h2>
        <p>I have live context from Polymarket and current news. Ask me anything.</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="suggest(this)">What are the biggest market movers today?</button>
          <button class="suggestion-btn" onclick="suggest(this)">Summarize the top news stories right now</button>
          <button class="suggestion-btn" onclick="suggest(this)">Which Polymarket bets have the most 24h volume?</button>
          <button class="suggestion-btn" onclick="suggest(this)">What events should I be watching this week?</button>
        </div>
      </div>
    </div>

    <div id="input-area">
      <div class="input-row">
        <textarea id="user-input" placeholder="Ask about markets, news, events..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button id="send-btn" onclick="sendMessage()">SEND →</button>
      </div>
      <div class="input-hint">ENTER to send · SHIFT+ENTER for newline</div>
    </div>
  </div>

  <!-- RIGHT: News -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Headlines</span>
      <span class="badge" id="news-count">—</span>
    </div>
    <div class="panel-search">
      <input type="text" id="news-search" placeholder="Search news..." onkeydown="if(event.key==='Enter') searchNews()">
      <button onclick="searchNews()">GO</button>
    </div>
    <div class="panel-body" id="news-body">
      <div class="loading-shimmer"></div>
      <div class="loading-shimmer" style="height:50px"></div>
      <div class="loading-shimmer"></div>
    </div>
  </div>

</div>

<script>
let chatHistory = [];
let isLoading = false;

// ── Clock ──
function updateClock() {
  document.getElementById('live-time').textContent = new Date().toLocaleTimeString('en-US', {hour12: false});
}
setInterval(updateClock, 1000);
updateClock();

// ── Init ──
async function init() {
  try {
    const res = await fetch('/api/init');
    const data = await res.json();
    chatHistory = data.history || [];
    renderMarkets(data.markets || []);
    renderNews(data.headlines || []);
    renderHistory();
    setLastUpdated(data.last_updated);
  } catch(e) {
    console.error('Init failed:', e);
  }
}

function setLastUpdated(ts) {
  if (!ts) return;
  const d = new Date(ts);
  document.getElementById('last-updated').textContent = `Updated ${d.toLocaleTimeString('en-US', {hour12:false})}`;
}

// ── Refresh ──
async function refreshData() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = '⟳ ...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/refresh', {method:'POST'});
    const data = await res.json();
    renderMarkets(data.markets || []);
    renderNews(data.headlines || []);
    setLastUpdated(data.last_updated);
  } catch(e) {}
  btn.textContent = '⟳ REFRESH';
  btn.disabled = false;
}

// ── Markets ──
function renderMarkets(markets) {
  const body = document.getElementById('markets-body');
  document.getElementById('market-count').textContent = markets.length;
  if (!markets.length) {
    body.innerHTML = '<div class="empty-state"><div class="icon">📊</div><span>No markets found</span></div>';
    return;
  }
  body.innerHTML = markets.map(m => {
    const bars = (m.pairs || []).map((p, i) => {
      const cls = p.label.toLowerCase().startsWith('yes') ? 'yes' : p.label.toLowerCase().startsWith('no') ? 'no' : 'other';
      const pctClass = p.prob >= 60 ? 'high' : p.prob <= 30 ? 'low' : 'mid';
      return `
        <div class="prob-row">
          <div class="prob-label-row">
            <span class="prob-label">${p.label}</span>
            <span class="prob-pct ${pctClass}">${p.prob}%</span>
          </div>
          <div class="prob-bar-track">
            <div class="prob-bar-fill ${cls}" style="width:${p.prob}%"></div>
          </div>
        </div>`;
    }).join('');

    const vol = m.volume24h >= 1000000
      ? `$${(m.volume24h/1000000).toFixed(2)}M`
      : m.volume24h >= 1000
        ? `$${(m.volume24h/1000).toFixed(1)}K`
        : `$${m.volume24h.toFixed(0)}`;

    return `
      <div class="market-card" onclick="askAboutMarket('${m.question.replace(/'/g,"\\'")}')">
        <div class="market-q">${m.question}</div>
        <div class="market-vol">24H VOL: <span>${vol}</span></div>
        <div class="prob-bars">${bars}</div>
        ${m.slug ? `<a class="market-link" href="https://polymarket.com/event/${m.slug}" target="_blank" onclick="event.stopPropagation()">→ VIEW ON POLYMARKET</a>` : ''}
      </div>`;
  }).join('');
}

async function searchMarkets() {
  const q = document.getElementById('market-search').value.trim();
  const body = document.getElementById('markets-body');
  body.innerHTML = '<div class="loading-shimmer"></div><div class="loading-shimmer"></div>';
  const url = q ? `/api/markets?q=${encodeURIComponent(q)}` : '/api/markets';
  const res = await fetch(url);
  const data = await res.json();
  renderMarkets(data);
}

function askAboutMarket(question) {
  document.getElementById('user-input').value = `Tell me more about the market: "${question}"`;
  document.getElementById('user-input').focus();
}

// ── News ──
function renderNews(articles) {
  const body = document.getElementById('news-body');
  document.getElementById('news-count').textContent = articles.length;
  if (!articles.length) {
    body.innerHTML = '<div class="empty-state"><div class="icon">📰</div><span>No articles found</span></div>';
    return;
  }
  body.innerHTML = articles.map(a => `
    <div class="news-card">
      <div class="news-source">
        <span>${(a.source||'').toUpperCase()}</span>
        <span class="news-date">${a.publishedAt||''}</span>
      </div>
      <a class="news-title" href="${a.url}" target="_blank">${a.title}</a>
    </div>
  `).join('');
}

async function searchNews() {
  const q = document.getElementById('news-search').value.trim();
  const body = document.getElementById('news-body');
  body.innerHTML = '<div class="loading-shimmer"></div><div class="loading-shimmer"></div>';
  const url = q ? `/api/news?q=${encodeURIComponent(q)}` : '/api/news';
  const res = await fetch(url);
  const data = await res.json();
  renderNews(data);
}

// ── Chat ──
function renderHistory() {
  if (!chatHistory.length) return;
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  chatHistory.forEach(msg => appendMessage(msg.role, msg.content, false));
  scrollToBottom();
}

function appendMessage(role, content, animate = true) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-label">${role === 'user' ? 'YOU' : 'ORACLE'}</div>
    <div class="msg-bubble">${escapeHtml(content)}</div>
  `;
  if (!animate) div.style.animation = 'none';
  msgs.appendChild(div);
  scrollToBottom();
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `
    <div class="msg-label">ORACLE</div>
    <div class="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  `;
  msgs.appendChild(div);
  scrollToBottom();
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  appendMessage('user', text);
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text, history: chatHistory})
    });
    const data = await res.json();
    removeTyping();
    if (data.error) {
      appendMessage('bot', `Error: ${data.error}`);
    } else {
      chatHistory = data.history;
      appendMessage('bot', data.reply);
    }
  } catch(e) {
    removeTyping();
    appendMessage('bot', 'Connection error. Is the server running?');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

async function clearHistory() {
  if (!confirm('Clear chat history?')) return;
  await fetch('/api/clear', {method:'POST'});
  chatHistory = [];
  document.getElementById('messages').innerHTML = `
    <div id="welcome">
      <h2>// ORACLE ONLINE</h2>
      <p>History cleared. Ask me anything.</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="suggest(this)">What are the biggest market movers today?</button>
        <button class="suggestion-btn" onclick="suggest(this)">Summarize the top news stories right now</button>
        <button class="suggestion-btn" onclick="suggest(this)">Which Polymarket bets have the most 24h volume?</button>
      </div>
    </div>`;
}

function suggest(btn) {
  document.getElementById('user-input').value = btn.textContent;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function scrollToBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Start ──
init();
</script>
</body>
</html>
